# PDFs may be large, but should never exceed 10 MiB.
client_max_body_size 10m;

# Don't tell nginx version to clients: potentially exploitable.
server_tokens off;

ssl_certificate     /ssl/crt.pem;
ssl_certificate_key /ssl/key.pem;
 
# Optimize for latency over throughput.
tcp_nodelay on;

upstream api {
  server api:$API_PORT;
}

upstream hasura {
  server hasura:$HASURA_PORT;
}

server {
    listen $NGINX_HTTP_PORT;
    server_name $DOMAIN;

    return 301 https://$host$request_uri;
}

server {
    listen $NGINX_HTTPS_PORT ssl http2;
    server_name $DOMAIN;

    # Operator-only: reachable from inside the box (localhost:8081 / docker exec
    # / SSH tunnel), never through the public proxy. nginx longest-prefix match
    # makes this win over /api/. 404 (not 403) so the route isn't confirmed.
    location /api/admin/ {
      return 404;
    }

    location /api/ {
      # The trailing slash is crucial:
      # Only with it does Nginx implicitly rewrite the request string as needed.
      proxy_pass http://api/;
    }

    location /graphql {
      # Here, on the other hand, we want just this specific endpoint
      proxy_pass http://hasura/v1/graphql;
    }

    # Endpoint for liveness checks
    location /status {
      stub_status;
    }

    # Hashed build assets live under /static/. If a specific file is missing
    # (e.g. a stale client requesting a chunk removed by a newer deploy),
    # return 404 instead of falling back to index.html below. Otherwise the
    # browser receives HTML in place of JS/CSS and fails to parse it
    # ("SyntaxError: Unexpected token '<'").
    location /static/ {
      root /build;
      try_files $uri =404;
    }

    location / {
      root /build;
      try_files $uri /index.html;
    }
}
