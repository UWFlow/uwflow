# PDFs may be large, but should never exceed 10 MiB.
client_max_body_size 10m;

# Don't tell nginx version to clients: potentially exploitable.
server_tokens off;

# Rate-limit zone for the analytics ingestion endpoint, keyed by client IP.
# This is the *edge* gate so a flood of analytics traffic can't starve the app;
# the Go handler enforces a second, finer per-IP token bucket. 10 req/s with a
# small burst is generous for real browsing and cheap to enforce here.
# (Defined in http context — conf.d files are included inside `http`.)
limit_req_zone $binary_remote_addr zone=events:10m rate=10r/s;

ssl_certificate     /ssl/crt.pem;
ssl_certificate_key /ssl/key.pem;
 
# Optimize for latency over throughput.
tcp_nodelay on;

upstream api {
  server api:$API_PORT;
}

upstream hasura {
  server hasura:$HASURA_PORT;
}

server {
    listen $NGINX_HTTP_PORT;
    server_name $DOMAIN;

    return 301 https://$host$request_uri;
}

server {
    listen $NGINX_HTTPS_PORT ssl http2;
    server_name $DOMAIN;

    location /api/ {
      # The trailing slash is crucial:
      # Only with it does Nginx implicitly rewrite the request string as needed.
      proxy_pass http://api/;
    }

    # Dedicated analytics ingestion endpoint. Isolated from /api/ so its rate
    # limit and tiny body cap can't affect (or be affected by) app traffic.
    # ClickHouse itself is never exposed here — only the Go ingestion handler.
    #
    # Two exact-match locations point at the same handler because the endpoint
    # is reached two ways:
    #   - /events      : same-origin / dev (frontend on localhost:8081, or any
    #                    client hitting this host directly).
    #   - /api/events  : production. The Vercel-hosted frontend resolves the
    #                    ingestion URL as `${BACKEND_ENDPOINT}/events` where
    #                    BACKEND_ENDPOINT is `/api`, and vercel.json rewrites
    #                    `/api/:path*` to this host. Without this exact-match
    #                    block the request would fall through to `location
    #                    /api/` (10 MB cap, no rate limit), bypassing the edge
    #                    flood protection. `= /api/events` outranks the `/api/`
    #                    prefix, so prod traffic gets the same hardening.
    # Both proxy to the API's /events route (the `/api/` prefix is *not*
    # stripped here — these are exact matches with an explicit upstream URI).
    location = /events {
      # Edge rate limit; allow a small burst, drop the rest with 429 (nodelay
      # so bursts aren't queued/slowed).
      limit_req zone=events burst=20 nodelay;
      limit_req_status 429;

      # Analytics payloads are tiny; reject anything larger early.
      client_max_body_size 64k;

      # Preserve the real client IP so the Go handler can hash + rate-limit it.
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Host $host;

      proxy_pass http://api/events;
    }

    location = /api/events {
      limit_req zone=events burst=20 nodelay;
      limit_req_status 429;

      client_max_body_size 64k;

      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Host $host;

      proxy_pass http://api/events;
    }

    location /graphql {
      # Here, on the other hand, we want just this specific endpoint
      proxy_pass http://hasura/v1/graphql;
    }

    # Endpoint for liveness checks
    location /status {
      stub_status;
    }

    location / {
      root /build;
      try_files $uri /index.html;
    }
}
