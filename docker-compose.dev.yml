services:
  api:
    image: uwflow-local/api:dev
    pull_policy: never
    build:
      context: ./flow
      target: dev
    command: sh -c "cd api && air"
    volumes:
      - ./flow:/build

  uw:
    image: uwflow-local/uw:dev
    pull_policy: never
    build:
      context: ./flow
      target: uw

  email:
    image: uwflow-local/email:dev
    pull_policy: never
    build:
      context: ./flow
      target: dev
    command: sh -c "cd email && air"
    volumes:
      - ./flow:/build

  # ClickHouse needs no local build override — it runs the public image as-is
  # from docker-compose.yml. Declared here only to document that local dev
  # (make start, which merges this file) includes it. The api container reaches
  # it on the internal network as host `clickhouse`.
  clickhouse: {}
