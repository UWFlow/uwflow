services:
  api:
    container_name: api
    depends_on:
      - postgres
    env_file: .env
    image: neuwflow/api:latest
    ports:
      - $API_PORT:$API_PORT
    restart: always
  frontend:
    container_name: frontend
    entrypoint: /nginx/run.sh
    env_file: .env
    image: neuwflow/frontend:latest
    ports:
      - $NGINX_HTTP_PORT:$NGINX_HTTP_PORT
      - $NGINX_HTTPS_PORT:$NGINX_HTTPS_PORT
    restart: always
    volumes:
      - ./nginx:/nginx:ro
      - ./.ssl:/ssl:ro
  postgres:
    container_name: postgres
    command: postgres -c 'max_connections=256' -p $POSTGRES_PORT
    env_file: .env
    image: postgres:15-alpine
    ports:
      - $POSTGRES_PORT:$POSTGRES_PORT
    restart: always
    volumes:
      - postgres:/var/lib/postgresql/data
  hasura:
    container_name: hasura
    depends_on:
      - postgres
    environment:
      HASURA_GRAPHQL_ADMIN_SECRET: $HASURA_GRAPHQL_ADMIN_SECRET
      HASURA_GRAPHQL_DATABASE_URL: postgres://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB
      HASURA_GRAPHQL_ENABLE_CONSOLE: "false" # Must be run manually to track migrations
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false" # Why is this even enabled by default?!
      HASURA_GRAPHQL_JWT_SECRET: '{"type": "HS256", "key": "${HASURA_GRAPHQL_JWT_KEY}"}'
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: $HASURA_GRAPHQL_UNAUTHORIZED_ROLE
    image: hasura/graphql-engine:v2.25.1.cli-migrations-v3
    ports:
      - $HASURA_PORT:$HASURA_PORT
    restart: always
    volumes:
      - ./hasura/migrations:/hasura-migrations
      - ./hasura/metadata:/hasura-metadata
  uw:
    container_name: uw
    depends_on:
      - postgres
    env_file: .env
    image: neuwflow/uw:latest
    restart: always
  email:
    container_name: email
    depends_on:
      - postgres
    env_file: .env
    image: neuwflow/email:latest
    restart: always
  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server:24
    restart: always
    environment:
      CLICKHOUSE_DB: $CLICKHOUSE_DB
      CLICKHOUSE_USER: $CLICKHOUSE_USER
      CLICKHOUSE_PASSWORD: $CLICKHOUSE_PASSWORD
      # Lets the configured user connect without IP allowlisting hassle on the
      # internal compose network. The container is NOT published to the host.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    # Deliberately NO `ports:` — ClickHouse stays on the internal compose
    # network only, reachable by the api container as host `clickhouse`.
    # Never expose 8123/9000 to the host or the public internet.
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    # Cap memory so a flood of analytics traffic can't OOM the single box.
    # ~10k events/day is tiny; 1 GiB is plenty of headroom.
    mem_limit: 1g
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - clickhouse:/var/lib/clickhouse
      # Init SQL runs once on an empty data dir (creates analytics.events).
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
volumes:
  postgres:
    name: backend_postgres
  clickhouse:
    name: backend_clickhouse
