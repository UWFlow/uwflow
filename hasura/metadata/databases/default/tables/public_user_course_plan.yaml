table:
  name: user_course_plan
  schema: public
object_relationships:
  - name: course
    using:
      foreign_key_constraint_on: course_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      columns:
        - course_id
        - user_id
        - term_id
select_permissions:
  - role: user
    permission:
      columns:
        - course_id
        - user_id
        - term_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
